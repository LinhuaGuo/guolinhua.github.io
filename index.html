<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郭霖桦 - 个人简介</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #FFFFFF;
            --surface: #F5F5F7;
            --accent: #0071E3;
            --accent-hover: #0077ED;
            --text-primary: #1D1D1F;
            --text-secondary: #86868B;
            --border: rgba(0, 0, 0, 0.06);
            --shadow-soft: 0 4px 30px rgba(0, 0, 0, 0.04);
            --shadow-elevated: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius: 20px;
            --radius-sm: 12px;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ===== Hero Section ===== */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -150px;
            left: -150px;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 113, 227, 0.04) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero-content {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .avatar-wrapper {
            width: 140px;
            height: 140px;
            margin: 0 auto 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent) 0%, #40A0FF 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(0, 113, 227, 0.2);
            position: relative;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .avatar-wrapper:hover {
            transform: scale(1.05);
        }

        .avatar-wrapper::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid rgba(0, 113, 227, 0.15);
            animation: pulse-ring 3s ease-in-out infinite;
        }

        .avatar-text {
            font-size: 52px;
            font-weight: 600;
            color: #FFFFFF;
            letter-spacing: -1px;
        }

        .hero-name {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1.5px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .hero-subtitle {
            font-size: 20px;
            font-weight: 400;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .hero-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 8px 20px;
            background: var(--surface);
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            color: var(--accent);
            letter-spacing: 0.2px;
        }

        .hero-tag .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            letter-spacing: 1px;
            animation: float 3s ease-in-out infinite;
        }

        .scroll-hint svg {
            width: 20px;
            height: 20px;
            stroke: var(--text-secondary);
            stroke-width: 1.5;
            fill: none;
        }

        /* ===== Info Section ===== */
        .info-section {
            padding: 100px 0;
        }

        .section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--text-primary);
            margin-bottom: 48px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .info-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 28px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: default;
            position: relative;
            overflow: hidden;
        }

        .info-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #40A0FF);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-elevated);
        }

        .info-card:hover::before {
            opacity: 1;
        }

        .info-card .icon {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            background: rgba(0, 113, 227, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .info-card .icon svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent);
            stroke-width: 1.8;
            fill: none;
        }

        .info-card .label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .info-card .value {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .info-card.full-width {
            grid-column: 1 / -1;
        }

        /* ===== Contact Section ===== */
        .contact-section {
            padding: 80px 0 120px;
        }

        .contact-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .contact-card {
            background: var(--text-primary);
            border-radius: var(--radius);
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            text-decoration: none;
        }

        .contact-card:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        }

        .contact-card .icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .contact-card .icon-circle svg {
            width: 22px;
            height: 22px;
            stroke: #FFFFFF;
            stroke-width: 1.8;
            fill: none;
        }

        .contact-card .contact-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .contact-card .contact-value {
            font-size: 16px;
            color: #FFFFFF;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* ===== Footer ===== */
        .footer {
            text-align: center;
            padding: 40px 0;
            border-top: 1px solid var(--border);
        }

        .footer p {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ===== Animations ===== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-ring {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.06);
                opacity: 0.5;
            }
        }

        @keyframes pulse-dot {
            0%, 100% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.4);
                opacity: 0.6;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-8px);
            }
        }

        .fade-in {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1), transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ===== Responsive ===== */
        @media (max-width: 640px) {
            .hero-name {
                font-size: 36px;
            }

            .hero-subtitle {
                font-size: 17px;
            }

            .info-grid,
            .contact-cards {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 28px;
            }

            .info-section {
                padding: 60px 0;
            }

            .contact-section {
                padding: 40px 0 80px;
            }
        }
    </style>
</head>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach((entry, index) => {
                if (entry.isIntersecting) {
                    const el = entry.target;
                    const delay = Array.from(el.parentElement.children).indexOf(el) * 100;
                    setTimeout(() => {
                        el.classList.add('visible');
                    }, delay);
                    observer.unobserve(el);
                }
            });
        }, {
            threshold: 0.1,
            rootMargin: '0px 0px -40px 0px'
        });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
    </script>
